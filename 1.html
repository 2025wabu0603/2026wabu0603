<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나랑 별 보러 가지 않을래</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 스마트폰 외형 */
        .phone-frame {
            width: 360px;
            height: 740px;
            background: white;
            border-radius: 40px;
            border: 12px solid #333;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        /* 상태바 */
        .status-bar {
            height: 30px;
            padding: 5px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            background: white;
            z-index: 10;
        }

        /* 배경 테마 (초록/파랑) */
        .theme-bg {
            background: linear-gradient(135deg, #e1f5fe 0%, #e8f5e9 100%);
        }

        .btn-nature {
            background: linear-gradient(to right, #4caf50, #2196f3);
            transition: transform 0.2s;
        }
        
        .btn-nature:active {
            transform: scale(0.95);
        }

        .category-btn {
            background: white;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .category-btn.active {
            border-color: #4caf50;
            background: #f1f8e9;
            transform: translateY(-2px);
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 15px;
        }

        /* 애니메이션 */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .loading-icon {
            animation: pulse 1.5s infinite;
        }

        /* 네비게이션 바 */
        .nav-bar {
            height: 60px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 5px;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="phone-frame">
        <!-- 상태바 -->
        <div class="status-bar">
            <span id="current-time">12:00</span>
            <div class="flex gap-1">
                <span>📶</span>
                <span>🔋</span>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 -->
        <div id="app-content" class="flex-1 overflow-y-auto theme-bg p-5">
            <!-- 초기 화면 -->
            <div id="step-1" class="text-center pt-4">
                <div class="mb-4">
                    <span class="text-3xl">🏔️</span>
                    <span class="text-3xl">🌊</span>
                </div>
                <h1 class="text-xl font-extrabold text-green-800 mb-1">나랑 별 보러 가지 않을래</h1>
                <p class="text-gray-600 mb-4 text-[11px] font-bold">날씨와 취향을 분석해 여행지를 찾아줄게!</p>
                
                <div class="card p-3 mb-4 text-left">
                    <h3 class="text-[11px] font-bold text-blue-600 mb-1">📍 현재 정보</h3>
                    <div id="weather-info" class="text-sm font-bold text-gray-800 leading-tight">날씨 정보 로딩 중...</div>
                    <div id="date-info" class="text-[10px] text-gray-500 mt-1">날짜 확인 중...</div>
                </div>

                <div class="text-left mb-4">
                    <h3 class="text-sm font-bold text-green-700 mb-2">어디로 떠나고 싶어? (택 1)</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectCategory('ocean', this)" class="category-btn p-3 rounded-xl shadow-sm text-center">
                            <div class="text-2xl mb-1">🌊</div>
                            <div class="text-xs font-bold">시원한 바다</div>
                        </button>
                        <button onclick="selectCategory('mountain', this)" class="category-btn p-3 rounded-xl shadow-sm text-center">
                            <div class="text-2xl mb-1">⛰️</div>
                            <div class="text-xs font-bold">초록빛 산/숲</div>
                        </button>
                        <button onclick="selectCategory('history', this)" class="category-btn p-3 rounded-xl shadow-sm text-center">
                            <div class="text-2xl mb-1">🏛️</div>
                            <div class="text-xs font-bold">역사와 문화</div>
                        </button>
                        <button onclick="selectCategory('city', this)" class="category-btn p-3 rounded-xl shadow-sm text-center">
                            <div class="text-2xl mb-1">☕</div>
                            <div class="text-xs font-bold">감성 카페/도시</div>
                        </button>
                    </div>
                </div>

                <button id="start-btn" onclick="startAnalysis()" disabled class="w-full py-4 rounded-2xl text-white font-bold text-lg shadow-lg opacity-50 bg-gray-400">
                    분석 시작하기 ✨
                </button>
            </div>

            <!-- 분석 로딩 화면 -->
            <div id="step-2" class="hidden flex flex-col items-center justify-center h-full text-center">
                <div class="loading-icon text-6xl mb-4">🔍</div>
                <h2 class="text-xl font-bold text-green-700 mb-2">여행지 분석 중...</h2>
                <p class="text-gray-500 text-sm">너의 취향과 이번 주말 날씨를<br>꼼꼼하게 살펴보고 있어!</p>
                <div class="w-48 h-2 bg-gray-200 rounded-full mt-6 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-green-500" style="width: 0%;"></div>
                </div>
            </div>

            <!-- 결과 화면 -->
            <div id="step-3" class="hidden">
                <div id="result-header" class="mb-4">
                    <span class="text-sm font-bold text-green-600">분석 결과</span>
                    <h2 class="text-xl font-extrabold text-blue-800">✨ 이번 주말 강력 추천!</h2>
                </div>
                <div id="recommendation-list">
                    <!-- 추천 카드들이 여기에 생성됨 -->
                </div>
                <button onclick="resetApp()" class="w-full py-3 mt-4 border-2 border-green-500 text-green-600 font-bold rounded-xl">
                    다른 테마로 추천받기 🔄
                </button>
            </div>
        </div>

        <!-- 하단 네비게이션 바 -->
        <div class="nav-bar">
            <button class="text-gray-400 flex flex-col items-center" onclick="resetApp()">
                <span class="text-xl">☰</span>
                <span class="text-[10px]">메뉴</span>
            </button>
            <button class="text-green-600 flex flex-col items-center" onclick="resetApp()">
                <span class="text-xl">⌂</span>
                <span class="text-[10px]">홈</span>
            </button>
            <button class="text-gray-400 flex flex-col items-center" onclick="resetApp()">
                <span class="text-xl">◁</span>
                <span class="text-[10px]">뒤로</span>
            </button>
        </div>
    </div>

    <script>
        // 확장된 여행지 데이터 풀
        const travelData = [
            { name: "가평 남이섬", desc: "초록초록한 메타세쿼이아 길을 걸으며 강바람을 맞기 좋아요!", cat: "mountain" },
            { name: "단양 만천하스카이워크", desc: "푸른 강 위를 걷는 기분! 짜릿한 풍경을 볼 수 있어요.", cat: "mountain" },
            { name: "제주 성산일출봉", desc: "푸른 바다와 산이 만나는 최고의 절경을 감상해보세요.", cat: "ocean" },
            { name: "강릉 안목해변", desc: "시원한 파도 소리를 들으며 커피 한 잔 어때요?", cat: "ocean" },
            { name: "순천만 국가정원", desc: "온 세상이 초록빛! 예쁜 꽃과 나무가 가득해요.", cat: "mountain" },
            { name: "담양 죽녹원", desc: "울창한 대나무 숲에서 맑은 공기를 듬뿍 마셔봐요.", cat: "mountain" },
            { name: "부산 광안리", desc: "밤바다의 별빛과 다리의 야경이 정말 낭만적이에요.", cat: "ocean" },
            { name: "춘천 소양강 스카이워크", desc: "강 위를 걸으며 푸른 하늘을 느껴보세요.", cat: "mountain" },
            { name: "경주 불국사", desc: "역사와 자연이 어우러진 산책길이 너무 예뻐요.", cat: "history" },
            { name: "서울 한강공원", desc: "강바람 솔솔~ 돗자리 펴고 쉬기에 딱 좋아요!", cat: "city" },
            { name: "수원 화성행궁", desc: "성곽길을 따라 걸으며 산과 도시를 한눈에 담아봐요.", cat: "history" },
            { name: "포항 호미곶", desc: "탁 트인 바다에서 힘찬 기운을 얻을 수 있어요.", cat: "ocean" },
            { name: "전주 한옥마을", desc: "맛있는 음식과 고즈넉한 한옥의 미를 느껴보세요.", cat: "history" },
            { name: "부산 해운대", desc: "끝없이 펼쳐진 백사장과 푸른 바다가 매력적이에요.", cat: "ocean" },
            { name: "제주 비자림", desc: "천년의 세월을 간직한 숲길에서 힐링해보세요.", cat: "mountain" },
            { name: "서울 성수동 카페거리", desc: "요즘 가장 핫한 감성 카페들이 모여있는 곳이에요.", cat: "city" },
            { name: "경주 첨성대", desc: "밤이 되면 조명이 켜져서 훨씬 더 예쁜 역사 명소예요.", cat: "history" },
            { name: "대구 김광석거리", desc: "골목 가득 흐르는 음악과 감성적인 벽화를 즐겨요.", cat: "city" }
        ];

        let selectedCat = "";
        let userWeather = "☀️ 맑음 (20°C)";

        // 카테고리 선택 함수
        function selectCategory(cat, el) {
            selectedCat = cat;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50', 'bg-gray-400');
            startBtn.classList.add('btn-nature');
        }

        // 시간 업데이트
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0');
            
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('date-info').innerText = 
                `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 날씨 및 위치 정보
        function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        try {
                            const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                            const data = await response.json();
                            const temp = Math.round(data.current_weather.temperature);
                            const code = data.current_weather.weathercode;
                            let emoji = "☀️";
                            if (code >= 1 && code <= 3) emoji = "☁️";
                            else if (code >= 45) emoji = "🌫️";
                            else if (code >= 51) emoji = "☔";
                            userWeather = `${emoji} 분석 완료 (${temp}°C)`;
                            document.getElementById('weather-info').innerHTML = `📍 내 위치 기반<br>${userWeather}`;
                        } catch (e) {
                            document.getElementById('weather-info').innerText = "날씨 연동 실패";
                        }
                    },
                    () => { document.getElementById('weather-info').innerText = "위치 확인 불가"; }
                );
            }
        }
        initApp();

        function startAnalysis() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            
            let prog = 0;
            const bar = document.getElementById('progress-bar');
            const interval = setInterval(() => {
                prog += 5;
                bar.style.width = prog + "%";
                if (prog >= 100) {
                    clearInterval(interval);
                    showResults();
                }
            }, 100);
        }

        function showResults() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');

            const list = document.getElementById('recommendation-list');
            list.innerHTML = '';

            // 선택한 카테고리로 필터링
            const filtered = travelData.filter(p => p.cat === selectedCat);
            const shuffled = filtered.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);

            selected.forEach((place, index) => {
                const card = document.createElement('div');
                card.className = 'card p-4 animate-fade-in cursor-pointer hover:bg-blue-50 transition-colors';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="text-3xl">${getEmoji(selectedCat)}</div>
                        <div class="flex-1">
                            <h3 class="font-bold text-lg text-green-900">${place.name}</h3>
                            <p class="text-xs text-gray-600 mt-1">${place.desc}</p>
                            <div class="mt-3 flex justify-between items-center">
                                <span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded-full font-bold">찰떡 궁합!</span>
                                <span class="text-xs font-bold text-blue-600">지도 보기 ></span>
                            </div>
                        </div>
                    </div>
                `;
                card.onclick = () => {
                    const url = `https://map.naver.com/v5/search/${encodeURIComponent(place.name)}`;
                    window.open(url, '_blank', 'noopener noreferrer');
                };
                list.appendChild(card);
            });
        }

        function getEmoji(cat) {
            if (cat === 'ocean') return '🌊';
            if (cat === 'mountain') return '⛰️';
            if (cat === 'history') return '🏛️';
            return '☕';
        }

        function resetApp() {
            selectedCat = "";
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'bg-gray-400');
            startBtn.classList.remove('btn-nature');
            
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('progress-bar').style.width = "0%";
        }
    </script>
</body>
</html>
